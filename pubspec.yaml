name: bang
description: A new Flutter project.
publish_to: 'none'
version: 1.0.3+4

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: any
  cupertino_icons: ^1.0.2
  hijri: ^3.0.0
  url_launcher: ^6.3.0
  audioplayers: ^6.0.0
  path_provider: ^2.1.2
  provider: ^6.1.2
  flutter_local_notifications: ^20.1.0
  timezone: ^0.10.1
  permission_handler: ^12.0.1
  wakelock_plus: ^1.4.0
  http: ^1.2.1
  ota_update: ^7.1.0
  shared_preferences: ^2.2.3
  android_intent_plus: ^6.0.0
  vibration: ^3.1.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - assets/audio/
    - assets/images/
    - assets/data/
  fonts:
    - family: NotoNaskh
      fonts:
        - asset: assets/fonts/noto.ttf

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/m_icon.png"
  remove_alpha_ios: true
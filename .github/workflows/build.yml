name: Build APK

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-java@v4 # وەشانی ٤ جێگیرترە
        with:
          distribution: 'zulu'
          java-version: '17'
          
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.2' # دڵنیابەرەوە ئەم وەشانە لای خۆت هەمان شتە
          
      - run: flutter pub get
      
      # پاککردنەوەی پڕۆژە پێش دروستکردن بۆ دوورکەوتنەوە لە کێشەی کاش
      - run: flutter clean
      
      # دروستکردنی APK
      # ئەگەر کیستۆرت نییە، ئەمە ڕەنگە Error بدات، بەڵام تاقیی بکەرەوە
      - run: flutter build apk --release

      - name: Create Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: build/app/outputs/flutter-apk/app-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
